<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rennan Penga — Dev</title>
    <meta name="description" content="Portfólio de Rennan de Oliveira Penga — Análise e Desenvolvimento de Sistemas" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-logo">RP<span class="dot">.</span></div>
        <ul class="nav-links">
            <li><a href="#sobre" class="nav-link">sobre</a></li>
            <li><a href="#habilidades" class="nav-link">habilidades</a></li>
            <li><a href="#projetos" class="nav-link">projetos</a></li>
            <li><a href="#contato" class="nav-link">contato</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <section class="hero">
        <canvas id="heroCanvas"></canvas>
    </section>

    <!-- CONTATO -->
    <section class="contato" id="contato">
        <div class="section-inner">

            <div class="contato-grid">

                <div class="contato-cta">
                    <p class="section-label">// contato</p>
                    <h2 class="contato-heading">Vamos<br /><span class="accent">Construir</span><br />Juntos.</h2>
                </div>

                <!-- ✅ FORMULÁRIO CORRIGIDO -->
                <div class="contato-form-wrap">

                    <form 
                        class="contato-form" 
                        id="contactForm" 
                        action="https://formspree.io/f/mpqeelgl"
                        method="POST"
                        novalidate>

                        <div class="field-group">
                            <input type="text" id="nome" name="nome" required placeholder=" " />
                            <label for="nome">Nome</label>
                        </div>

                        <div class="field-group">
                            <input type="email" id="email" name="email" required placeholder=" " />
                            <label for="email">E-mail</label>
                        </div>

                        <div class="field-group">
                            <textarea id="mensagem" name="mensagem" required placeholder=" " rows="4"></textarea>
                            <label for="mensagem">Mensagem</label>
                        </div>

                        <button type="submit" class="btn-submit">
                            <span class="btn-text">Enviar Mensagem</span>
                            <span class="btn-arrow">→</span>
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="sys-notification" id="sysNotification">
            <span class="sys-icon">✓</span>
            <div>
                <p class="sys-title">Mensagem enviada!</p>
                <p class="sys-sub">Responderei em breve.</p>
            </div>
        </div>

    </section>

    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-logo">RP<span class="dot">.</span></p>
            <p class="footer-copy">© <span id="year"></span> Rennan Penga.</p>
        </div>
    </footer>

    <div class="skill-tooltip" id="skillTooltip"></div>

    <!-- ✅ SÓ SEU JS -->
    <script src="script.js"></script>

</body>
</html>
